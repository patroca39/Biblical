name: Biblical Anime Daily Automation

on:
  schedule:
    # Runs at 10:00 AM UTC (approx. 6:00 PM in Tacloban)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual testing

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (FFmpeg & ImageMagick)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick ffmpeg > /dev/null
          # This policy fix is essential for MoviePy to generate the anime-style text overlays
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Biblical Automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python main.py

      - name: Save Video Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biblical-anime-video
          path: biblical_export.mp4
