name: Curious Lens Daily Automation

on:
  schedule:
    - cron: '15 11 * * *'  # 7:15 AM EST / 7:15 PM PHT
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # Policy override to allow TextClip rendering
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added gspread and oauth2client for Google Sheets integration
          pip install requests pillow moviepy==1.0.3 google-genai elevenlabs \
          google-api-python-client google-auth-httplib2 google-auth-oauthlib \
          PyJWT gspread oauth2client

      - name: Run Video Generation Script
        env:
          # --- API KEYS ---
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
          
          # --- GOOGLE SHEETS MEMORY ---
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          
          # --- YOUTUBE AUTH ---
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          # Executes your master script
          python main.py 

      - name: Save Video & Assets to GitHub
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Curious_Lens_Export_Package
          path: |
            biblical_export.mp4
            scene_A.png
            scene_B.png
            scene_C.png
            scene_D.png
