name: Biblical Anime Daily Automation

on:
  schedule:
    # Runs at 08:00 AM UTC (4:00 PM local time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Increased to allow for Leonardo rendering time

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick ffmpeg > /dev/null
          # Fixes ImageMagick policy to allow TextClip rendering
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Biblical Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
        run: python main.py

      - name: Upload Video Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: biblical-final-video
          path: biblical_export.mp4
          retention-days: 3
