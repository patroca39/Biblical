name: Curious Lens Daily Automation

on:
  schedule:
    # Runs at 10:00 AM UTC every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # 🚨 REQUIRED: Overrides security policy to allow TextClip to render subtitles
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # 🚨 PINNED VERSION: MoviePy 1.0.3 prevents breaking changes. PyJWT added for Kling.
          pip install requests pillow moviepy==1.0.3 google-genai elevenlabs google-api-python-client google-auth-httplib2 google-auth-oauthlib PyJWT

      - name: Run Video Generation Script
        env:
          # 🚨 SECRETS MAPPING: Matches your repository secrets perfectly
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
          KLING_AK: ${{ secrets.KLING_AK }}
          KLING_SK: ${{ secrets.KLING_SK }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          # 🚨 Make sure this matches the exact name of your python file in the repo.
          # Change to python scanner.py if you are running the Geopolitics news version.
          python biblical_scanner.py 

      - name: Save Video & Assets to GitHub (Artifact Fallback)
        uses: actions/upload-artifact@v4
        if: always() # 🚨 CRITICAL: Saves files even if the YouTube upload API hits a quota
        with:
          name: Curious_Lens_Export_Package
          path: |
            biblical_export.mp4
            viral_export.mp4
            kling_bg.mp4
            thumbnail_clickbait.png
